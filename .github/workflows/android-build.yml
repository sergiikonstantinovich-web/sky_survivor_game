name: Build Signed APK and AAB

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Capacitor CLI
        run: npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6

      - name: Build web project
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || echo "No index.html at root"
          cp -r assets www/ 2>/dev/null || true
          cp -r css www/ 2>/dev/null || true
          cp -r js www/ 2>/dev/null || true

      - name: Initialize Capacitor
        run: |
          npx cap init "Sky Survivor" "ru.mygame.skysurvivor" --web-dir=www
          npx cap add android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

      - name: Set up signing config
        run: |
          cd android
          echo "storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}" > key.properties
          echo "keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=sky-survivor" >> key.properties
          echo "storeFile=../release.keystore" >> key.properties
          cd ..

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Build signed APK and AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
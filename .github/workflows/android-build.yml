name: Build Signed APK and AAB

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          ls -la release.keystore

      - name: Build with Capacitor
        run: |
          npm install @capacitor/core@6 @capacitor/cli@6 @capacitor/android@6
          mkdir -p www
          cp -r . www/ 2>/dev/null || true
          cp -r resources www/ 2>/dev/null || true
          npx cap init "Sky Survivor" "ru.mygame.skysurvivor" --web-dir=www
          npx cap add android
          
          # [ВОЗВРАЩАЕМ ИКОНКУ]
          # Ставим утилиту для нарезки картинок
          sudo apt-get update && sudo apt-get install -y imagemagick
          
          RES_DIR="android/app/src/main/res"
          if [ -f resources/icon.png ]; then
            # Удаляем дефолтные адаптивные xml-иконки, чтобы они не перекрывали нашу png
            find $RES_DIR -name "ic_launcher.xml" -delete || true
            find $RES_DIR -name "ic_launcher_round.xml" -delete || true
            
            # Нарезаем под все разрешения Android
            convert resources/icon.png -resize 48x48 $RES_DIR/mipmap-mdpi/ic_launcher.png || true
            convert resources/icon.png -resize 72x72 $RES_DIR/mipmap-hdpi/ic_launcher.png || true
            convert resources/icon.png -resize 96x96 $RES_DIR/mipmap-xhdpi/ic_launcher.png || true
            convert resources/icon.png -resize 144x144 $RES_DIR/mipmap-xxhdpi/ic_launcher.png || true
            convert resources/icon.png -resize 192x192 $RES_DIR/mipmap-xxxhdpi/ic_launcher.png || true
            
            convert resources/icon.png -resize 48x48 $RES_DIR/mipmap-mdpi/ic_launcher_round.png || true
            convert resources/icon.png -resize 72x72 $RES_DIR/mipmap-hdpi/ic_launcher_round.png || true
            convert resources/icon.png -resize 96x96 $RES_DIR/mipmap-xhdpi/ic_launcher_round.png || true
            convert resources/icon.png -resize 144x144 $RES_DIR/mipmap-xxhdpi/ic_launcher_round.png || true
            convert resources/icon.png -resize 192x192 $RES_DIR/mipmap-xxxhdpi/ic_launcher_round.png || true
            echo "Иконки успешно сгенерированы!"
          else
            echo "Внимание: resources/icon.png не найден, оставляем дефолтную!"
          fi
          
          # Копируем созданный на прошлом шаге ключ прямо внутрь андроид-проекта
          cp release.keystore android/app/
          
          npx cap sync android

      - name: Sign and Build
        run: |
          cd android
          chmod +x gradlew
          # Передаем параметры подписи "на лету" без изменения build.gradle файла
          # (Замени пароли и алиас ниже на свои, если они отличаются от дефолтных)
          ./gradlew clean assembleRelease bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=release.keystore \
            -Pandroid.injected.signing.store.password=store123 \
            -Pandroid.injected.signing.key.alias=sky-survivor \
            -Pandroid.injected.signing.key.password=key123
          cd ..

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          # Изменили маску пути, чтобы забирать файлы БЕЗ слова "unsigned"
          path: android/app/build/outputs/apk/release/*-release.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab

name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor and Build APK
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi
          
          mkdir -p www
          cp index.html www/ 2>/dev/null || true
          cp style.css www/ 2>/dev/null || true
          cp game.js www/ 2>/dev/null || true
          cp -r assets www/ 2>/dev/null || true
          
          npm install @capacitor/core@6 @capacitor/cli@6
          npx cap init "Sky Survivor" "ru.mygame.skysurvivor" --web-dir=www
          
          npm install @capacitor/android@6
          npx cap add android
          
          # Генерируем иконки из папки resources перед синхронизацией
          npm install @capacitor/assets
          npx cordova-res android --skip-splash || true
          
          chmod +x android/gradlew
          npx cap sync
          
          cd android && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

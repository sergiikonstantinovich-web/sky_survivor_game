name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Capacitor and Build APK
        run: |
          # Создаем пустой package.json, если его нет, чтобы npm не ругался
          if [ ! -f package.json ]; then
            npm init -y
          fi
          
          # Устанавливаем Capacitor
          npm install @capacitor/core @capacitor/cli
          
          # Инициализируем проект Capacitor
          npx cap init "Sky Survivor" "ru.mygame.skysurvivor" --web-dir=.
          
          # Добавляем Android-платформу
          npm install @capacitor/android
          npx cap add android
          
          # Синхронизируем файлы игры с андроид-папкой
          npx cap sync
          
          # Собираем сам APK-файл
          cd android && ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

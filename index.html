<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; style-src * 'unsafe-inline';">
    <title>Sky Survivor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stats-panel">
        <div class="stat-box">🪙 Золото: <span id="gold-val">0</span></div>
        <div class="stat-box">🏆 Очки: <span id="score-val">0</span></div>
    </div>

    <div class="game-container">
        <button id="research-btn" class="ui-icon-btn research-pos">🔼</button>
        
        <div class="hp-bar-container">
            <div id="hp-bar-fill" class="hp-bar-fill"></div>
        </div>

        <button id="pause-btn" class="ui-icon-btn pause-pos">⏸️</button>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="pause-screen" class="overlay-screen hidden">
            <div class="pause-content">
                <h2>ИГРА НА ПАУЗЕ</h2>
                <button id="resume-btn" onclick="if(window.Game) window.Game.togglePause()" style="
                    background: #4caf50; color: white; border: none; 
                    padding: 12px 24px; font-size: 16px; font-weight: bold; 
                    border-radius: 8px; margin-top: 15px; width: 100%;
                    cursor: pointer; font-family: sans-serif; text-transform: uppercase;
                ">
                    ▶️ Продолжить
                </button>
            </div>
        </div>

        <div id="research-screen" class="overlay-screen hidden">
            <div class="pause-content" style="max-width: 100%; width: 100%; height: 100%; padding: 10px; display: flex; flex-direction: column; box-sizing: border-box;">
                </div>
        </div>

        <div id="combo-hud" class="combo-container hidden">
            <span id="combo-rank" class="combo-rank">D</span>
            <span id="combo-count" class="combo-count">x0</span>
        </div>
        
        <div style="position: absolute; top: 75px; left: 50%; transform: translateX(-50%); width: 140px; height: 6px; z-index: 10;">
            <div id="fever-hud" style="width: 100%; height: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 3px; overflow: hidden;">
                <div id="fever-bar-fill" style="width: 0%; height: 100%; background: linear-gradient(90deg, #ff00cc, #3333ff); transition: width 0.1s linear; box-shadow: 0 0 8px #ff00cc;"></div>
            </div>
            <button id="ult-btn" onclick="if(window.gameState && window.gameState.fever >= 100) window.Game.activateFeverMode();"></button>
        </div>

    </div> <script type="text/javascript">
        window.onerror = function(m, s, l, c) {
            alert("JS КРАШ: " + m + " на " + l + ":" + c);
            return false;
        };
    </script>

    <script type="text/javascript" src="config.js"></script>
    <script type="text/javascript" src="ui.js"></script>
    <script type="text/javascript" src="engine.js"></script>
    <script type="text/javascript" src="game.js"></script>
    
    <script type="text/javascript">
        let appReady = false;
        function initApp() {
            if (appReady) return;
            appReady = true;
            if (window.Game && typeof window.Game.start === 'function') {
                window.Game.start();
            } else {
                alert("Ошибка: window.Game не найден!");
            }
        }
        document.addEventListener('deviceready', initApp, false);
        document.addEventListener('DOMContentLoaded', initApp, false);
    </script>
</body>
</html>

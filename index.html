<!DOCTYPE html>
<html lang="ru">
<head>
<div id="dev-console" style="
    position: fixed; 
    bottom: 0; 
    left: 0; 
    width: 100%; 
    height: 150px; 
    background: rgba(0, 0, 0, 0.9); 
    color: #00ff00; 
    font-family: monospace; 
    font-size: 11px; 
    z-index: 999999; 
    overflow-y: scroll; 
    border-top: 2px solid #00f0ff;
    padding: 5px;
    box-sizing: border-box;
    pointer-events: auto;
    display: block;
">
    <div style="font-weight: bold; color: #00f0ff; border-bottom: 1px solid #333; padding-bottom: 3px; margin-bottom: 5px;">
        📟 ДИАГНОСТИКА АПК (Логи):
    </div>
    <div id="dev-console-logs"></div>
</div>

<script>
    (function() {
        const consoleLogDist = document.getElementById('dev-console-logs');
        
        function logToScreen(message, color = '#00ff00') {
            if (!consoleLogDist) return;
            const logLine = document.createElement('div');
            logLine.style.color = color;
            logLine.style.marginBottom = '3px';
            logLine.style.wordBreak = 'break-all';
            logLine.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            consoleLogDist.appendChild(logLine);
            
            // Автоскролл вниз при новых логах
            document.getElementById('dev-console').scrollTop = document.getElementById('dev-console').scrollHeight;
        }

        // Перехват обычных console.log
        const oldLog = console.log;
        console.log = function(...args) {
            oldLog.apply(console, args);
            logToScreen(args.join(' '), '#ffffff');
        };

        // Перехват критических ошибок JS (ReferenceError, SyntaxError и т.д.)
        window.onerror = function(message, source, lineno, colno, error) {
            const fileName = source ? source.split('/').pop() : 'unknown';
            logToScreen(`❌ КРИТ: ${message} (${fileName}:${lineno}:${colno})`, '#ff3333');
            return false;
        };

        // Перехват косяков с асинхронным кодом
        window.addEventListener('unhandledrejection', function(event) {
            logToScreen(`❌ АСИНХ_ОШИБКА: ${event.reason}`, '#ff9900');
        });

        // Контрольный выстрел — проверяем, жива ли вообще среда
        document.addEventListener("DOMContentLoaded", () => {
            logToScreen("Система отладки запущена. Ожидание загрузки модулей...", '#00f0ff');
        });
    })();
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:; script-src 'self' 'unsafe-inline' 'unsafe-eval';">
    <title>Sky Survivor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stats-panel">
        <div class="stat-box">🪙 Золото: <span id="gold-val">0</span></div>
        <div class="stat-box">🏆 Очки: <span id="score-val">0</span></div>
    </div>

    <div class="game-container">
        <button id="research-btn" class="ui-icon-btn research-pos">🔼</button>
        
        <div class="hp-bar-container">
            <div id="hp-bar-fill" class="hp-bar-fill"></div>
        </div>

        <button id="pause-btn" class="ui-icon-btn pause-pos">⏸️</button>
        
        <canvas id="gameCanvas"></canvas>
        
        <div id="pause-screen" class="overlay-screen hidden">
            <div class="pause-content">
                <h2>ИГРА НА ПАУЗЕ</h2>
                <p>Тапни по экрану, чтобы продолжить</p>
            </div>
        </div>
    </div>

    <div class="action-panel">
        <button id="upgrade-btn" class="rok-btn">
            🔬 Замедлить поток времени <br>
            <span id="upgrade-cost-text">(Цена: 100 🪙)</span>
        </button>
    </div>
    <script type="text/javascript" src="config.js"></script>
    <script type="text/javascript" src="ui.js"></script>
    <script type="text/javascript" src="engine.js"></script>
    <script type="text/javascript" src="game.js"></script>
    
    <script type="text/javascript">
        let appReady = false;

        function initApp() {
            if (appReady) return;
            appReady = true;
            
            if (window.Game) {
                window.Game.start();
            }
        }
        
        // Слушаем оба события, но сработает строго первое из них
        document.addEventListener('deviceready', initApp, false);
        document.addEventListener('DOMContentLoaded', initApp, false);
    </script>
</body>
</html>
